openapi: 3.1.0
info:
  title: Api
  version: 0.3.0
  description: Autonomous Taxi Fleet Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: simulation
    description: Taxi fleet simulation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /simulate:
    post:
      operationId: runSimulation
      tags: [simulation]
      summary: Run taxi simulation step
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
      responses:
        "200":
          description: Simulation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationState"
  /simulate/reset:
    post:
      operationId: resetSimulation
      tags: [simulation]
      summary: Reset the simulation
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationState"
  /simulate/state:
    get:
      operationId: getSimulationState
      tags: [simulation]
      summary: Get current simulation state
      responses:
        "200":
          description: Current simulation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationState"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SimulationRequest:
      type: object
      properties:
        steps:
          type: integer
          default: 1
    TaxiDebugInfo:
      type: object
      properties:
        chosenAction:
          type: string
        qValue:
          type: number
        demandScore:
          type: number
        rebalancingScore:
          type: number
        stateKey:
          type: string
      required:
        - chosenAction
        - qValue
        - demandScore
        - rebalancingScore
        - stateKey
    Zone:
      type: object
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        demand:
          type: number
        predictedDemand:
          type: number
        waitingPassengers:
          type: integer
        taxiCount:
          type: integer
        name:
          type: string
        trafficLevel:
          type: number
        category:
          type: string
        imbalance:
          type: number
          description: predictedDemand - taxiSupply (positive = underserved)
      required:
        - id
        - row
        - col
        - demand
        - predictedDemand
        - waitingPassengers
        - taxiCount
        - name
        - trafficLevel
        - category
        - imbalance
    Taxi:
      type: object
      properties:
        id:
          type: string
        row:
          type: integer
        col:
          type: integer
        status:
          type: string
          enum: [idle, carrying_passenger, moving_to_pickup]
        tripsCompleted:
          type: integer
        revenue:
          type: number
        lastAction:
          type: string
        destinationZone:
          type: string
          nullable: true
        tripTimeRemaining:
          type: integer
          nullable: true
        debugInfo:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/TaxiDebugInfo"
      required:
        - id
        - row
        - col
        - status
        - tripsCompleted
        - revenue
        - lastAction
    RLAnalytics:
      type: object
      properties:
        epsilon:
          type: number
          description: Current exploration rate
        replayBufferSize:
          type: integer
          description: Number of transitions stored
        episodeNumber:
          type: integer
        avgQValue:
          type: number
          description: Average Q-value across all entries this episode
        predictionAccuracy:
          type: number
          description: 1 - avg(|predicted - actual| / max(actual, 1)) over last 10 steps
        totalQUpdates:
          type: integer
      required:
        - epsilon
        - replayBufferSize
        - episodeNumber
        - avgQValue
        - predictionAccuracy
        - totalQUpdates
    SimulationMetrics:
      type: object
      properties:
        totalTripsCompleted:
          type: integer
        totalRevenue:
          type: number
        averageWaitTime:
          type: number
        utilizationRate:
          type: number
        totalReward:
          type: number
        timeStep:
          type: integer
        episodeReward:
          type: number
      required:
        - totalTripsCompleted
        - totalRevenue
        - averageWaitTime
        - utilizationRate
        - totalReward
        - timeStep
        - episodeReward
    HistoryPoint:
      type: object
      properties:
        timeStep:
          type: integer
        tripsCompleted:
          type: integer
        revenue:
          type: number
        utilizationRate:
          type: number
        waitTime:
          type: number
        reward:
          type: number
        episodeReward:
          type: number
        avgQValue:
          type: number
          description: Average Q-value snapshot at this step
        epsilon:
          type: number
          description: Exploration rate at this step
        predictionAccuracy:
          type: number
      required:
        - timeStep
        - tripsCompleted
        - revenue
        - utilizationRate
        - waitTime
        - reward
        - episodeReward
        - avgQValue
        - epsilon
        - predictionAccuracy
    SimulationState:
      type: object
      properties:
        taxis:
          type: array
          items:
            $ref: "#/components/schemas/Taxi"
        zones:
          type: array
          items:
            $ref: "#/components/schemas/Zone"
        metrics:
          $ref: "#/components/schemas/SimulationMetrics"
        history:
          type: array
          items:
            $ref: "#/components/schemas/HistoryPoint"
        rlAnalytics:
          $ref: "#/components/schemas/RLAnalytics"
        gridSize:
          type: integer
        running:
          type: boolean
        debugMode:
          type: boolean
      required:
        - taxis
        - zones
        - metrics
        - history
        - rlAnalytics
        - gridSize
        - running
        - debugMode
